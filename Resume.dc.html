<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:#F4F3EF;color:#15171B;-webkit-font-smoothing:antialiased;font-family:'Archivo',system-ui,sans-serif}

<div style="min-height:100vh;background:#F4F3EF;display:flex;flex-direction:column;">

  <!-- top bar -->
  <div style="border-bottom:1px solid #DEDCD3;background:rgba(244,243,239,.9);">
    <div style="max-width:1180px;margin:0 auto;padding:0 40px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:24px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.04em;">
      <a href="Portfolio.dc.html" style="text-decoration:none;color:#62656D;">← INDEX</a>
      <span style="color:#15171B;font-weight:600;">RENAD ALANAZI</span>
    </div>
  </div>

  <!-- header -->
  <header style="max-width:1180px;margin:0 auto;width:100%;padding:64px 40px 32px;">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:oklch(0.56 0.14 252);margin-bottom:26px;">Resume</div>
    <div style="display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:24px;">
      <h1 style="font-weight:800;font-size:clamp(34px,5vw,58px);line-height:1.0;letter-spacing:-0.035em;margin:0;max-width:16ch;">Renad Alanazi, Electrical Engineer</h1>
      <!-- DEPLOYMENT NOTE: the embedded viewer and both buttons reference the production path
           "/Renad_Alanazi_Resume.pdf". Before deploying to GitHub/Vercel, place

           The links and embed resolve once the site is live; inside the Claude preview the file
           is not served at the domain root, so the embed/links will not open here.
           Do NOT use temporary preview asset URLs, blob URLs, or base64. -->
      <div style="display:flex;flex-wrap:wrap;gap:12px;">
        <a href="./Renad_Alanazi_Resume.pdf" download="Renad_Alanazi_Resume.pdf" style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;color:#F4F3EF;background:#15171B;border:1px solid #15171B;padding:13px 22px;border-radius:4px;white-space:nowrap;">Download PDF</a>
        <a href="./Renad_Alanazi_Resume.pdf" target="_blank" rel="noopener" style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;color:#15171B;background:transparent;border:1px solid #CFCCC2;padding:13px 22px;border-radius:4px;white-space:nowrap;">Open in New Tab</a>
      </div>
    </div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.03em;color:#62656D;margin-top:24px;">
      alanazirenad.f@gmail.com &nbsp;·&nbsp;
      <a href="https://www.linkedin.com/in/renad-alanazi" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">linkedin.com/in/renad-alanazi</a> &nbsp;·&nbsp;
      <a href="https://github.com/Renad-Alanazi" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">github.com/Renad-Alanazi</a>
    </div>
  </header>

  <!-- embedded resume viewer -->
  <main style="max-width:1180px;margin:0 auto;width:100%;padding:0 40px 64px;flex:1;">
    <div style="border:1px solid #DEDCD3;background:#fff;overflow:hidden;border-radius:4px;">
      <object data="./Renad_Alanazi_Resume.pdf" type="application/pdf" style="width:100%;height:min(82vh,1140px);display:block;">
        <iframe src="./Renad_Alanazi_Resume.pdf" title="Renad Alanazi resume" style="width:100%;height:min(82vh,1140px);border:0;display:block;">
          <div style="padding:48px 32px;text-align:center;font-size:16px;line-height:1.6;color:#3C3F46;">

            <a href="./Renad_Alanazi_Resume.pdf" target="_blank" rel="noopener" style="color:oklch(0.56 0.14 252);font-weight:600;">Open the resume PDF →</a>

        </iframe>
      </object>
    </div>
    <p style="font-size:15px;line-height:1.6;color:#62656D;margin:18px 0 0;">Use the buttons above to view or download my resume.</p>
  </main>

  <!-- footer -->
  <footer style="border-top:1px solid #DEDCD3;background:#F4F3EF;padding:40px 0;">
    <div style="max-width:1180px;margin:0 auto;padding:0 40px;display:flex;flex-wrap:wrap;justify-content:space-between;gap:16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.04em;color:#62656D;">

      <a href="Portfolio.dc.html" style="text-decoration:none;color:#62656D;">← Back to portfolio index</a>
